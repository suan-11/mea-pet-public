# CI for MeaPet
#
# Runs lint, syntax check, and tests across supported Python versions.
# System dependencies are installed for PyQt5 / OpenGL on Linux.
# Dependencies are installed from pyproject.toml (no requirements.txt).

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      # Use .python-version (3.12) as the primary — it's listed first in the status
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (PyQt5 / OpenGL)
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          libxcb-xinerama0 \
          libgl1-mesa-dev \
          libegl1-mesa-dev \
          libxkbcommon-x11-0 \
          libdbus-1-3 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xkb1 \
          libxcb-xv0 \
          xvfb

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core + linux extras (pins exact PyQt5 / Pillow versions for Linux)
        pip install -e ".[linux]"

    - name: Lint with ruff
      run: |
        python -m ruff check meapet wizard scripts tests

    - name: Syntax check with compileall
      run: |
        python -m compileall -q meapet wizard

    - name: Test with pytest (headless)
      run: |
        xvfb-run python -m pytest -q
