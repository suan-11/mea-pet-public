# CI for MeaPet
#
# Runs lint, syntax check, and tests across supported Python versions.
# System dependencies are installed for PyQt5 / OpenGL on Linux.
# Dependencies are installed from pyproject.toml (no requirements.txt).

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      # Use .python-version (3.12) as the primary — it's listed first in the status
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (PyQt5 / OpenGL)
      run: |
        # 1. 清理本地 apt 缓存（解决缓存损坏导致的 exit code 100）
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
          
        # 2. 恢复官方源（如果之前用 sed 改过，这里重新覆盖为官方源）
        sudo bash -c 'cat > /etc/apt/sources.list <<EOF
        deb http://archive.ubuntu.com/ubuntu $(lsb_release -cs) main restricted universe multiverse
        deb http://archive.ubuntu.com/ubuntu $(lsb_release -cs)-updates main restricted universe multiverse
        deb http://archive.ubuntu.com/ubuntu $(lsb_release -cs)-backports main restricted universe multiverse
        deb http://security.ubuntu.com/ubuntu $(lsb_release -cs)-security main restricted universe multiverse
        EOF'
          
        # 3. 更新源并安装依赖
        sudo apt-get update
        sudo apt-get install -y \
           libgl1 \
           mesa-common-dev \
           libosmesa6-dev \
            freeglut3-dev \
            libglu1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xfixes0 \
            libxcb-xinerama0


    - name: Install Python dependencies
      timeout-minutes: 10
      run: |
        pip install --upgrade pip setuptools wheel
        pip install PyQt5==5.15.9
        pip install -e ".[linux]"

    - name: Install ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    
    - name: Lint with ruff
      run: |
        python -m ruff check meapet wizard scripts tests

    - name: Syntax check with compileall
      run: |
        python -m compileall -q meapet wizard

    - name: Test with pytest (headless)
      run: |
        xvfb-run python -m pytest -q
